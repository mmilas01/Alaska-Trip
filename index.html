<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8f7f4;
  --bg2:#ffffff;
  --bg3:#f0eeea;
  --border:#d8d4cc;
  --text:#1a1a1a;
  --text2:#6b6b6b;
  --text3:#aaaaaa;
  --accent:#1a5fb4;
  --accent2:#ddeeff;
  --green:#2d7a3a;
  --green-bg:#e6f4ea;
  --amber:#b45309;
  --amber-bg:#fef3c7;
  --red:#c0392b;
  --red-bg:#fdecea;
  --gold:#1a1a1a;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;font-size:16px}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8f7f4;gap:0}
#splash svg{width:160px;height:160px}
#splash h1{margin-top:20px;font-size:22px;font-weight:700;color:#1a5fb4;letter-spacing:3px;text-transform:uppercase}
#splash p{margin-top:6px;font-size:13px;color:#6b6b6b;letter-spacing:1px}
#splash.hidden{display:none}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* HEADER */
.app-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px 10px;flex-shrink:0}
.app-header h1{font-size:16px;font-weight:600;color:#1a5fb4;letter-spacing:1px}
.app-header p{font-size:12px;color:var(--text2);margin-top:1px}

/* TABS */
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:10px 14px;font-size:12px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s}
.tab-btn.active{color:#1a5fb4;border-bottom-color:#1a5fb4}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 80px}

/* PANELS */
.panel{display:none;padding:12px 16px}
.panel.active{display:block}

/* PROGRESS */
.prog-wrap{margin-bottom:14px}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-label{font-size:12px;color:var(--text2)}
.prog-pct{font-size:12px;font-weight:600;color:var(--green)}
.prog-bar{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:4px;transition:width 0.3s}
.reset-btn{font-size:11px;color:var(--text3);border:1px solid var(--border);background:none;padding:3px 10px;border-radius:20px;cursor:pointer;margin-left:8px}

/* SECTION */
.section-head{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.section-head:first-child{margin-top:4px}

/* CHECK ITEMS */
.check-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-item input[type=checkbox]{width:20px;height:20px;flex-shrink:0;margin-top:1px;accent-color:var(--green);cursor:pointer;border-radius:4px}
.check-item label{font-size:14px;line-height:1.4;color:var(--text);cursor:pointer;flex:1}
.check-item.done label{color:var(--text3);text-decoration:line-through}
.check-item .sub{font-size:12px;color:var(--text2);margin-top:2px;display:block}

/* HOTELS */
.hotel-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.hotel-card.nrf{border-left:3px solid var(--red)}
.hotel-card.warn{border-left:3px solid var(--amber)}
.hotel-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.hotel-name{font-size:15px;font-weight:600;color:var(--text)}
.hotel-day-badge{font-size:11px;font-weight:500;color:#1a5fb4;background:#ddeeff;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.conf-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.conf-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.conf-num{font-family:'SF Mono','Fira Code',monospace;font-size:14px;font-weight:600;color:var(--green);letter-spacing:0.5px}
.hotel-addr{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.4}
.hotel-note{font-size:12px;color:var(--text2);line-height:1.5;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:10px}
.hotel-note.red{color:var(--red);background:var(--red-bg)}
.hotel-note.amber{color:var(--amber);background:var(--amber-bg)}
.hotel-actions{display:flex;gap:8px;flex-wrap:wrap}
.h-btn{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;text-decoration:none}
.h-btn:active{opacity:0.7}

/* ITINERARY */
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.day-num{font-size:12px;font-weight:600;color:var(--gold)}
.day-date{font-size:12px;color:var(--text2)}
.day-route{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.day-stats{display:flex;gap:12px;font-size:12px;color:var(--text2);margin-bottom:8px}
.day-stats span{display:flex;align-items:center;gap:3px}
.day-notes{font-size:12px;color:var(--text2);line-height:1.5}
.day-notes .alert{color:var(--amber);display:block;margin-top:4px}

/* FUEL */
.fuel-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.fuel-stop-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.fuel-note{font-size:12px;color:var(--amber);margin-bottom:10px}
.fuel-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fuel-field label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:4px}
.fuel-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:14px;-webkit-appearance:none}
.fuel-field input:focus{outline:none;border-color:var(--accent)}
.fuel-total{margin-top:10px;font-size:13px;color:var(--text2);display:flex;justify-content:space-between}
.fuel-total span{color:var(--green);font-weight:600}
.fuel-summary{background:var(--bg3);border-radius:10px;padding:12px;margin-top:16px}
.fuel-summary h3{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.fuel-sum-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)}
.fuel-sum-row:last-child{border-bottom:none;font-weight:600;color:var(--gold);padding-top:8px}

/* WEATHER */
.wx-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.wx-card.rain{border-left:3px solid var(--accent)}
.wx-card.wind{border-left:3px solid var(--amber)}
.wx-card.clear{border-left:3px solid var(--green)}
.wx-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.wx-location{font-size:15px;font-weight:600;color:var(--text)}
.wx-date{font-size:11px;color:var(--text2);margin-top:2px}
.wx-icon{font-size:28px}
.wx-temps{display:flex;gap:12px;margin-bottom:6px}
.wx-high{font-size:18px;font-weight:700;color:var(--text)}
.wx-low{font-size:18px;color:var(--text2)}
.wx-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px}
.wx-detail{font-size:12px;color:var(--text2);display:flex;flex-direction:column;gap:2px}
.wx-detail span:first-child{font-size:10px;text-transform:uppercase;letter-spacing:0.05em}
.wx-detail span:last-child{color:var(--text);font-weight:500}
.wx-alert{font-size:12px;color:var(--amber);background:var(--amber-bg);padding:6px 10px;border-radius:6px;margin-top:8px}
.wx-drone{font-size:12px;color:var(--green);background:var(--green-bg);padding:6px 10px;border-radius:6px;margin-top:6px}
.wx-loading{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
.wx-refresh{font-size:12px;color:var(--accent);border:1px solid var(--accent);background:none;padding:6px 16px;border-radius:20px;cursor:pointer;display:block;margin:0 auto 16px}

</style>
</head>

<div id="app">

// ─── RENDER CHECKLISTS ────────────────────────────────────────────────────
function renderList(name){
  const data = LISTS[name];
  const saved = JSON.parse(localStorage.getItem('ak_'+name)||'{}');
  const el = document.getElementById(name+'-container');
  let html='', total=0, checked=0;
  for(const [sec,items] of Object.entries(data)){
    html+=`<div class="section-head">${sec}</div>`;
    items.forEach((item,i)=>{
      const key=sec+'|'+i;
      const done=saved[key]||false;
      if(done)checked++; total++;
      html+=`<div class="check-item${done?' done':''}" id="${name}_${key.replace(/[^a-z0-9]/gi,'_')}">
        <input type="checkbox" id="cb_${name}_${i}_${sec.replace(/\W/g,'')}" ${done?'checked':''} onchange="toggle('${name}','${key}',this)">
        <label for="cb_${name}_${i}_${sec.replace(/\W/g,'')}">
          ${item.t}
          ${item.s?`<span class="sub">${item.s}</span>`:''}
        </label>
      </div>`;
    });
  }
  el.innerHTML=html;
  updateProg(name,checked,total);
}

function updateProg(name,checked,total){
  const pct=total?Math.round(checked/total*100):0;
  document.getElementById(name+'-fill').style.width=pct+'%';
  document.getElementById(name+'-label').textContent=`${checked} of ${total} · ${pct}%`;
}

function toggle(name,key,cb){
  const saved=JSON.parse(localStorage.getItem('ak_'+name)||'{}');
  saved[key]=cb.checked;
  localStorage.setItem('ak_'+name,JSON.stringify(saved));
  const row=cb.closest('.check-item');
  cb.checked?row.classList.add('done'):row.classList.remove('done');
  const panel=document.getElementById('panel-'+name);
  const allCbs=panel.querySelectorAll('input[type=checkbox]');
  const checkedCount=[...allCbs].filter(c=>c.checked).length;
  updateProg(name,checkedCount,allCbs.length);
}

function resetList(name){
  if(!confirm('Reset all checkboxes for this list?'))return;
  localStorage.removeItem('ak_'+name);
  renderList(name);
}

// ─── RENDER FUEL LOG ──────────────────────────────────────────────────────
function renderFuel(){
  const saved=JSON.parse(localStorage.getItem('ak_fuel')||'{}');
  const el=document.getElementById('fuel-container');
  const customStops=JSON.parse(localStorage.getItem('ak_fuel_custom')||'[]');

  // Build merged sorted stop list first so MPG calc includes custom stops
  const allStops=[
    ...FUEL_STOPS.map(s=>({...s,custom:false})),
    ...customStops.map(s=>({...s,custom:true}))
  ];
  allStops.sort((a,b)=>{
    const odoA=parseFloat((saved[a.key]||{}).odo||0);
    const odoB=parseFloat((saved[b.key]||{}).odo||0);
    if(odoA&&odoB) return odoA-odoB;
    if(odoA&&!odoB) return -1;
    if(!odoA&&odoB) return 1;
    const aIdx=FUEL_STOPS.findIndex(s=>s.key===a.key);
    const bIdx=FUEL_STOPS.findIndex(s=>s.key===b.key);
    if(aIdx>=0&&bIdx>=0) return aIdx-bIdx;
    if(aIdx>=0) return -1;
    if(bIdx>=0) return 1;
    return a.key.localeCompare(b.key);
  });

  // Calculate MPG using sorted allStops so custom stops are included
  const mpgData=[];
  let prevOdo=null;
  allStops.forEach(stop=>{
    const d=saved[stop.key]||{};
    if(d.odo&&d.gal&&prevOdo){
      const miles=parseFloat(d.odo)-parseFloat(prevOdo);
      const gals=parseFloat(d.gal);
      if(miles>0&&gals>0) mpgData.push({key:stop.key,mpg:(miles/gals).toFixed(1),miles:miles.toFixed(0),towing:stop.towing});
    }
    if(d.odo) prevOdo=d.odo;
  });

  // Summary stats using allStops
  let totalUSD=0,totalCAD=0,totalGalUSD=0,totalGalCAD=0;
  let soloMiles=0,soloGal=0,towingMiles=0,towingGal=0;
  let prevOdo2=null;
  allStops.forEach(stop=>{
    const d=saved[stop.key]||{};
    if(d.gal&&d.price){
      const amt=parseFloat(d.gal)*parseFloat(d.price);
      const g=parseFloat(d.gal);
      if((d.cur||'USD').toUpperCase()==='CAD'){totalCAD+=amt;totalGalCAD+=g;}
      else{totalUSD+=amt;totalGalUSD+=g;}
    }
    if(d.odo&&prevOdo2){
      const miles=parseFloat(d.odo)-parseFloat(prevOdo2);
      const g=parseFloat(d.gal)||0;
      if(stop.towing){towingMiles+=miles;towingGal+=g;}
      else{soloMiles+=miles;soloGal+=g;}
    }
    if(d.odo) prevOdo2=d.odo;
  });

  const soloMPG=soloGal>0?(soloMiles/soloGal).toFixed(1):'—';
  const towingMPG=towingGal>0?(towingMiles/towingGal).toFixed(1):'—';
  const soloMPGNum=soloGal>0?soloMiles/soloGal:16;
  const towingMPGNum=towingGal>0?towingMiles/towingGal:8;
  // Reimbursement: extra fuel cost due to towing (miles driven towing at solo MPG vs actual towing MPG)
  let reimb='—';
  if(towingMiles>0&&towingGal>0&&soloGal>0){
    const galIfSolo=towingMiles/soloMPGNum;
    const extraGal=towingGal-galIfSolo;
    const avgPrice=totalUSD>0?totalUSD/totalGalUSD:4.25;
    reimb='$'+(extraGal*avgPrice).toFixed(2)+' USD est.';
  }

  let html=`<div class="fuel-summary" style="margin-bottom:16px">
    <h3>Trip fuel summary</h3>
    <div class="fuel-sum-row"><span>USD fuel spend</span><span style="color:var(--green)">$${totalUSD.toFixed(2)}</span></div>
    <div class="fuel-sum-row"><span>CAD fuel spend</span><span style="color:var(--green)">$${totalCAD.toFixed(2)} CAD</span></div>
    <div class="fuel-sum-row"><span>Solo MPG (no trailer)</span><span>${soloMPG} mpg</span></div>
    <div class="fuel-sum-row"><span>Towing MPG (with trailer)</span><span>${towingMPG} mpg</span></div>
    <div class="fuel-sum-row"><span>Reimbursement estimate</span><span style="color:var(--amber)">${reimb}</span></div>
    <div class="fuel-sum-row"><span>Budget</span><span>$2,000 USD</span></div>
  </div>`;

  // Render all stops

  allStops.forEach((stop)=>{
    const d=saved[stop.key]||{};
    const locked=d.locked||false;
    const stopTotal=(d.gal&&d.price)?(parseFloat(d.gal)*parseFloat(d.price)).toFixed(2):null;
    const mpgEntry=mpgData.find(m=>m.key===stop.key);
    const customIdx=customStops.findIndex(s=>s.key===stop.key);
    const borderStyle=locked?'border-left:3px solid var(--green)':(stop.custom?'border-left:3px solid var(--accent)':'');
    html+=`<div class="fuel-card" style="${borderStyle}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div class="fuel-stop-name">${stop.name}</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
          ${stop.towing?'<span style="font-size:11px;background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:10px">🚚 Towing</span>':'<span style="font-size:11px;background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:10px">🚗 Solo</span>'}
          ${locked
            ?`<span style="font-size:11px;background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:10px">🔒 Locked</span>
               <button onclick="toggleLock('${stop.key}',false)" style="font-size:11px;padding:2px 8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:10px;cursor:pointer">Unlock</button>`
            :`<button onclick="toggleLock('${stop.key}',true)" style="font-size:11px;padding:2px 8px;border:1px solid var(--green);background:var(--green-bg);color:var(--green);border-radius:10px;cursor:pointer">🔒 Lock</button>
               <button onclick="deleteFuelStop('${stop.key}',${stop.custom},${customIdx})" style="font-size:11px;padding:2px 8px;border:1px solid var(--border);background:var(--red-bg);color:var(--red);border-radius:10px;cursor:pointer">✕ Delete</button>`
          }
        </div>
      </div>
      <div class="fuel-note">${stop.note||''}</div>
      ${d.lat?`<div style="font-size:11px;color:var(--text2);margin-bottom:8px">📍 ${parseFloat(d.lat).toFixed(4)}, ${parseFloat(d.lon).toFixed(4)} · ${d.loctime||''}</div>`:''}
      ${locked?'':`<button onclick="captureLocation('${stop.key}')" style="font-size:12px;padding:6px 14px;border:1px solid var(--accent);background:var(--accent2);color:var(--accent);border-radius:20px;cursor:pointer;margin-bottom:10px;width:100%">📍 Capture my location now</button>`}
      <div class="fuel-inputs">
        <div class="fuel-field"><label>Gallons (or litres)</label><input type="number" step="0.01" placeholder="e.g. 18.4" value="${d.gal||''}" ${locked?'disabled':''} onchange="saveFuel('${stop.key}','gal',this.value)"></div>
        <div class="fuel-field"><label>Price per unit</label><input type="number" step="0.001" placeholder="e.g. 4.25" value="${d.price||''}" ${locked?'disabled':''} onchange="saveFuel('${stop.key}','price',this.value)"></div>
        <div class="fuel-field"><label>Odometer (miles)</label><input type="number" placeholder="e.g. 48220" value="${d.odo||''}" ${locked?'disabled':''} onchange="saveFuel('${stop.key}','odo',this.value)"></div>
        <div class="fuel-field"><label>Currency</label><input type="text" placeholder="USD or CAD" value="${d.cur||'USD'}" ${locked?'disabled':''} onchange="saveFuel('${stop.key}','cur',this.value)"></div>
      </div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        ${stopTotal?`<div style="font-size:13px;color:var(--text2)">Stop cost: <strong style="color:var(--green)">$${stopTotal} ${d.cur||'USD'}</strong></div>`:''}
        ${mpgEntry?`<div style="font-size:13px;color:var(--text2)">Leg MPG: <strong style="color:${parseFloat(mpgEntry.mpg)<10?'var(--amber)':'var(--green)'}">${mpgEntry.mpg} mpg</strong> (${mpgEntry.miles} mi)</div>`:''}
      </div>
    </div>`;
  });

  html+=`<div style="margin-top:8px">
    <button onclick="addCustomStop()" style="width:100%;padding:14px;border:2px dashed var(--accent);background:var(--accent2);color:var(--accent);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.5px">
      + Add Fuel Stop
    </button>
  </div>`;

  el.innerHTML=html;
}

function addCustomStop(){
  const name=prompt('Fuel stop name (e.g. "Elko, NV — Chevron"):');
  if(!name||!name.trim()) return;
  // Show towing choice overlay
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px';
  overlay.innerHTML=`<div style="background:var(--bg2);border-radius:16px;padding:24px;width:100%;max-width:320px;text-align:center">
    <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Were you towing?</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px">${name}</div>
    <div style="display:flex;gap:12px">
      <button id="btn-solo" style="flex:1;padding:14px;border:2px solid var(--green);background:var(--green-bg);color:var(--green);border-radius:12px;font-size:15px;font-weight:600;cursor:pointer">🚗 Solo</button>
      <button id="btn-tow" style="flex:1;padding:14px;border:2px solid var(--amber);background:var(--amber-bg);color:var(--amber);border-radius:12px;font-size:15px;font-weight:600;cursor:pointer">🚚 Towing</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  const finish=(towing)=>{
    document.body.removeChild(overlay);
    const key='custom_'+Date.now();
    const customStops=JSON.parse(localStorage.getItem('ak_fuel_custom')||'[]');
    customStops.push({name:name.trim(),key,towing,note:'Custom stop'});
    localStorage.setItem('ak_fuel_custom',JSON.stringify(customStops));
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        pos=>{
          const saved=JSON.parse(localStorage.getItem('ak_fuel')||'{}');
          if(!saved[key])saved[key]={};
          saved[key].lat=pos.coords.latitude.toFixed(6);
          saved[key].lon=pos.coords.longitude.toFixed(6);
          saved[key].loctime=new Date().toLocaleString();
          localStorage.setItem('ak_fuel',JSON.stringify(saved));
          renderFuel();
        },
        ()=>renderFuel(),
        {enableHighAccuracy:true,timeout:10000}
      );
    } else { renderFuel(); }
  };
  document.getElementById('btn-solo').onclick=()=>finish(false);
  document.getElementById('btn-tow').onclick=()=>finish(true);
}

function toggleLock(key,lock){
  const saved=JSON.parse(localStorage.getItem('ak_fuel')||'{}');
  if(!saved[key])saved[key]={};
  saved[key].locked=lock;
  localStorage.setItem('ak_fuel',JSON.stringify(saved));
  renderFuel();
}

function deleteFuelStop(key,isCustom,customIdx){
  if(!confirm('Delete this fuel stop and all its data?')) return;
  // Remove data
  const saved=JSON.parse(localStorage.getItem('ak_fuel')||'{}');
  delete saved[key];
  localStorage.setItem('ak_fuel',JSON.stringify(saved));
  // If custom, remove from custom list too
  if(isCustom){
    const customStops=JSON.parse(localStorage.getItem('ak_fuel_custom')||'[]');
    customStops.splice(customIdx,1);
    localStorage.setItem('ak_fuel_custom',JSON.stringify(customStops));
  }
  renderFuel();
}

function deleteCustomStop(index){
  const customStops=JSON.parse(localStorage.getItem('ak_fuel_custom')||'[]');
  const key=customStops[index]?.key;
  deleteFuelStop(key,true,index);
}

function captureLocation(key){
  if(!navigator.geolocation){alert('GPS not available on this device.');return;}
  const btn=event.target;
  btn.textContent='📍 Getting location...';
  btn.disabled=true;
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const saved=JSON.parse(localStorage.getItem('ak_fuel')||'{}');
      if(!saved[key])saved[key]={};
      saved[key].lat=pos.coords.latitude.toFixed(6);
      saved[key].lon=pos.coords.longitude.toFixed(6);
      saved[key].loctime=new Date().toLocaleString();
      saved[key].accuracy=Math.round(pos.coords.accuracy)+'m';
      localStorage.setItem('ak_fuel',JSON.stringify(saved));
      renderFuel();
    },
    err=>{
      btn.textContent='📍 Capture my location now';
      btn.disabled=false;
      alert('Could not get location. Make sure location access is allowed for this site in Safari Settings.');
    },
    {enableHighAccuracy:true,timeout:10000}
  );
}

function saveFuel(key,field,val){
  const saved=JSON.parse(localStorage.getItem('ak_fuel')||'{}');
  if(!saved[key])saved[key]={};
  saved[key][field]=val;
  localStorage.setItem('ak_fuel',JSON.stringify(saved));
  renderFuel();
}

  {name:"Willow, AK",date:"Jul 9",lat:61.7554,lon:-150.0427,drone:false}
];

const WX_CODES = {
  0:"☀️",1:"🌤",2:"⛅",3:"☁️",
  45:"🌫",48:"🌫",
  51:"🌦",53:"🌦",55:"🌧",
  61:"🌧",63:"🌧",65:"🌧",
  71:"🌨",73:"🌨",75:"🌨",77:"🌨",
  80:"🌦",81:"🌧",82:"🌧",
  85:"🌨",86:"🌨",
  95:"⛈",96:"⛈",99:"⛈"
};

const WX_DESC = {
  0:"Clear",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",
  45:"Fog",48:"Icy fog",
  51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",
  61:"Light rain",63:"Rain",65:"Heavy rain",
  71:"Light snow",73:"Snow",75:"Heavy snow",77:"Snow grains",
  80:"Light showers",81:"Showers",82:"Heavy showers",
  85:"Snow showers",86:"Heavy snow showers",
  95:"Thunderstorm",96:"Thunderstorm+hail",99:"Thunderstorm+hail"
};

function toF(c){return Math.round(c*9/5+32);}

async function loadWeather(){
  const el=document.getElementById('weather-container');
  el.innerHTML='<div class="wx-loading">🌍 Loading forecasts for all 13 stops...</div>';
  const results=[];
  for(const stop of STOPS){
    try{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${stop.lat}&longitude=${stop.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max&timezone=auto&forecast_days=16`;
      const r=await fetch(url);
      const d=await r.json();
      results.push({stop,data:d});
    }catch(e){
      results.push({stop,data:null});
    }
  }
  renderWeather(results);
}

function renderWeather(results){
  const el=document.getElementById('weather-container');
  // Trip dates in local format — index matches STOPS array
  const TRIP_DATES=['2026-06-27','2026-06-27','2026-06-28','2026-06-30','2026-07-01','2026-07-02','2026-07-03','2026-07-04','2026-07-05','2026-07-06','2026-07-07','2026-07-08','2026-07-09'];
  let html='<button class="wx-refresh" onclick="loadWeather()">↻ Refresh forecasts</button>';
  html+='<div style="font-size:11px;color:var(--text2);text-align:center;margin-bottom:12px">Powered by Open-Meteo · Updates each time you open this tab</div>';

  results.forEach(({stop,data},i)=>{
    const targetDate=TRIP_DATES[i];
    let dayIdx=-1;
    if(data&&data.daily&&data.daily.time){
      dayIdx=data.daily.time.indexOf(targetDate);
    }

    if(!data||dayIdx===-1){
      html+=`<div class="wx-card">
        <div class="wx-header"><div><div class="wx-location">${stop.name}</div><div class="wx-date">${stop.date} · ${targetDate}</div></div><span class="wx-icon">🗓</span></div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">Forecast for ${targetDate} not yet available — check closer to departure</div>
      </div>`;
      return;
    }

    const code=data.daily.weathercode[dayIdx];
    const high=data.daily.temperature_2m_max[dayIdx];
    const low=data.daily.temperature_2m_min[dayIdx];
    const precip=data.daily.precipitation_probability_max[dayIdx];
    const wind=data.daily.windspeed_10m_max[dayIdx];
    const icon=WX_CODES[code]||'🌡';
    const desc=WX_DESC[code]||'Unknown';
    const isRain=(code>=51&&code<=82)||code>=95;
    const isWind=wind>40;
    const isClear=code<=2;
    let cardClass='wx-card';
    if(isRain)cardClass+=' rain';
    else if(isWind)cardClass+=' wind';
    else if(isClear)cardClass+=' clear';

    html+=`<div class="${cardClass}">
      <div class="wx-header">
        <div>
          <div class="wx-location">${stop.name}</div>
          <div class="wx-date">${stop.date} · ${desc}</div>
        </div>
        <span class="wx-icon">${icon}</span>
      </div>
      <div class="wx-temps">
        <span class="wx-high">${toF(high)}°F <span style="font-size:13px;color:var(--text2)">(${Math.round(high)}°C)</span></span>
        <span class="wx-low">${toF(low)}°F <span style="font-size:13px">(${Math.round(low)}°C)</span></span>
      </div>
      <div class="wx-details">
        <div class="wx-detail"><span>Rain chance</span><span>${precip}%</span></div>
        <div class="wx-detail"><span>Wind</span><span>${Math.round(wind*0.621)} mph</span></div>
        <div class="wx-detail"><span>Conditions</span><span>${desc}</span></div>
      </div>
      ${isRain?`<div class="wx-alert">⚠️ Rain expected — pack rain gear, protect gear</div>`:''}
      ${isWind?`<div class="wx-alert">⚠️ High winds — caution towing, drone flying</div>`:''}
      ${stop.drone&&!isRain&&!isWind?`<div class="wx-drone">🚁 ${stop.droneNote} — conditions look good for flying</div>`:''}
      ${stop.drone&&(isRain||isWind)?`<div class="wx-alert">🚁 ${stop.droneNote} — weather may limit flying</div>`:''}
    </div>`;
  });
  document.getElementById('weather-container').innerHTML=html;
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='weather') loadWeather();
}
